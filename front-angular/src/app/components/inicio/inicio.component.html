<div class="min-h-screen bg-[#FAFAF9] flex flex-col justify-between items-center py-16 px-4 font-sans select-none">

    <div></div>

    <div class="flex flex-col items-center text-center max-w-2xl mx-auto">
        <h1 class="text-6xl font-bold text-stone-900 tracking-tight mb-6">
            Trilog
        </h1>

        <div class="w-16 h-0.5 bg-[#BEBFF5] mb-8 rounded-full"></div>

        <p class="text-base text-stone-600 font-medium leading-relaxed mb-2 tracking-wide">
            Aprende un idioma escribiendo
        </p>

        <p class="text-base text-stone-600 font-medium leading-relaxed mb-8 tracking-wide">
            tres frases al día
        </p>

        <p
            class="flex items-center justify-center text-lg font-bold mb-12 bg-gradient-to-right from-[#6366F1] to-[#8b5cf6] bg-clip-text text-transparent tracking-wide">
            <span class="animate-drop-1">Ayer</span>
            <span class="dot animate-drop-dot-1">·</span>
            <span class="animate-drop-2">Hoy</span>
            <span class="dot animate-drop-dot-2">·</span>
            <span class="animate-drop-3">Mañana</span>
        </p>

        <button class="button button-item" (click)="comenzar()">
            <span class="button-bg">
                <span class="button-bg-layers">
                    <span class="button-bg-layer button-bg-layer-1 -color-detalle"></span>
                    <span class="button-bg-layer button-bg-layer-2 -color-pastel"></span>
                    <span class="button-bg-layer button-bg-layer-3 -color-principal"></span>
                </span>
            </span>
            <span class="button-inner">
                <span class="button-inner-static">Comenzar</span>
                <span class="button-inner-hover">Comenzar</span>
            </span>
        </button>
    </div>

    <div class="text-center">
        <p class="text-xs font-medium text-stone-400 tracking-widest uppercase" style="letter-spacing: 0.15em;">
            Un hábito simple · Progreso real
        </p>
    </div>

</div>
